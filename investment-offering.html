      "Description":`Three purpose-built, single-tenant outpatient medical office assets held debt-free in a DST: HonorHealth Complete Care (12,000 SF, Surprise AZ, Phoenix MSA, lease to 2042), Texas Children's Pavilion for Women (12,642 SF, Cedar Park/Austin TX, co-located one block from the tenant's own hospital campus, lease to 2038), and a United Healthcare/ProHealth Physicians clinic (26,547 SF on 6.40 ac, Bristol CT, lease to 2037). Submarkets are infill/Sun Belt growth corridors with strong daytime traffic and household incomes ($78k-$125k) and constrained MOB supply (~6.9% national availability). Thesis is durable, escalating net-lease income from investment-grade-equivalent healthcare credit, underpinned by secular outpatient-care migration and aging demographics. Operating strategy is passive triple-net ownership through an affiliated master tenant, with insurance fully tenant-reimbursed and de minimis trust-level expense; income growth is driven entirely by contractual 2.0%-2.5% escalators.`,
      "Highlight 1":`The portfolio exhibits a credit barbell. Texas Children's Hospital (AA-/Fitch) and the UnitedHealth Group parent (AA-/Fitch, A/AM Best) supply investment-grade-equivalent corporate backing, while HonorHealth (A+/Fitch) is a single-state Arizona nonprofit system. Income is disproportionately weighted to Bristol, whose ~$1.15M gross rent is roughly 44% of in-place rent, concentrating cash flow in a single asset and a single tenant whose parent's Fitch outlook was revised to negative in July 2025 - a trajectory the static AA- marketing presentation omits.`,
      "Highlight 2":`Weighted average remaining lease term is 13.62 years across staggered expirations (Surprise 2042, Austin 2038, Bristol 2037). Duration is asymmetric: the long-dated HonorHealth lease carries the lowest escalator (2.0%), while the largest asset (Bristol) escalates 2.5% only through year 9 and then steps flat, capping income growth on the portfolio's biggest rent stream precisely as the projected disposition window approaches.`,
      "Highlight 3":`Real estate quality is high and recently delivered (2022-2024 vintage), purpose-built for outpatient use. The Austin asset's co-location one block from Texas Children's own hospital campus creates a mission-critical referral linkage that raises renewal probability and tenant switching costs; the Surprise asset is the sole urgent care within a 3.5-mile radius in a high-traffic retail corridor (71,024 VPD). These siting characteristics function as soft barriers to entry that support re-leasing economics.`,
      "Highlight 4":`The debt-free capital structure removes refinancing, maturity, rate-cap, and foreclosure risk entirely, and eliminates the equal-or-greater-debt replacement requirement for 1031 investors averse to boot-offsetting leverage. The structural cost is the absence of positive financial leverage, which mechanically caps levered IRR and is the primary reason the 5.00% going-in distribution sits below comparable leveraged net-lease DSTs.`,
      "Highlight 5":`The triple-net structure with tenant-reimbursed insurance and ~$1,400/year trust-level property expense insulates distributable cash from operating inflation. The qualifier is capital responsibility: the Trust retains certain capex obligations funded only from a modest reserve that declines from $371,000 to ~$67,764 by 2035, drawn down immediately by a $221,000 Connecticut transfer-tax charge in year 1, leaving limited capacity for unbudgeted tenant improvements and condition-assessment items.`,
      "Pros":`The offering pairs institutional-grade healthcare net-lease credit with a defensive, unlevered balance sheet. Tenants are investment-grade-equivalent corporate operators on long-dated NNN leases (13.62-yr WALT) with contractual 2.0%-2.5% escalators, in demographically supported submarkets benefiting from outpatient-care migration, an aging cohort, and tight MOB supply. The debt-free structure removes refinance, maturity, cap-cost, and foreclosure exposure and offers a clean basis for 1031 capital seeking certainty of monthly income. The sponsor carries a ~40-year, 153-program operating history, including 57 full-cycle 1031 offerings averaging 6.37% annual cash-on-cash, and the distribution schedule escalates from 5.00% to 6.14% over the projected hold.`,
      "Cons":`Income is concentrated in three single-tenant assets, with Bristol/United Healthcare alone at ~44% of rent, rendering any single vacancy binary to portfolio cash flow. The master tenant is thinly capitalized - funded by a $500,000 demand promissory note (not cash) from an affiliate, with projected Y1 net income of only ~$2,013 - so a subtenant payment interruption would rapidly exhaust the master tenant's cushion and the trust's limited reserves. The Bristol escalator caps at year 9 and steps flat, flattening growth on the largest asset into the disposition window, where that lease (2037 expiry) leaves only ~1.5 years of residual term at a 2035 exit - a material re-leasing/rollover overhang on the highest-rent asset at the point of valuation. The UNH parent's Fitch outlook turned negative in July 2025, and the Bristol lessee is an operating subsidiary rather than the rated parent. Reserve adequacy is thin post the $221,000 CT transfer-tax draw, and a one-month UNH rent abatement (August 2026) dampens Y1 collections.`,
      "Insights":`This is a low-beta, income-oriented core net-lease vehicle whose return is almost entirely a function of contractual escalators and terminal value, given the absence of leverage and any value-add component. The 5.00% to 6.14% distribution ramp is mechanically supported by the lease schedule, but the early-year spread between subtenant rent collected and master-lease rent paid is razor-thin, concentrating execution risk in the thinly capitalized master tenant. The debt-free design is genuinely defensive in a higher-for-longer regime, sidestepping the leveraged-net-lease maturity wall and cap-cost repricing, but the same feature suppresses yield - the 5.00% going-in sits below AEI's own operating-program current yield (5.48%) and full-cycle average (6.37%), implying reliance on escalators and exit pricing compression to reach target total return. The dominant underwriting sensitivity is terminal value: with no amortization and a fixed escalator schedule, investor IRR is governed by the year-10 disposition pricing against a portfolio whose largest asset will carry only short residual lease term at exit, while Austin (2038) and Surprise (2042) provide longer-dated support to residual value. Feasibility of the projected distributions is reasonable on a contractual basis; the credible variance is in capital-event timing and exit pricing rather than in-place income.`,

    const isRecommended = recommendedOfferingNames.has(bookmarkKey);

    function readBookmarkState() {
      try {
        const stored = JSON.parse(localStorage.getItem(BOOKMARK_STATE_KEY) || "{}");
        return { favorites:new Set(stored.favorites || []), excludedRecommendations:new Set(stored.excludedRecommendations || []) };
      } catch (error) {
        return { favorites:new Set(), excludedRecommendations:new Set() };
      }
    }

    function writeBookmarkState(state) {
      try {
        localStorage.setItem(BOOKMARK_STATE_KEY, JSON.stringify({ favorites:[...state.favorites], excludedRecommendations:[...state.excludedRecommendations] }));
      } catch (error) { /* Local file storage may be unavailable. */ }
    }

    function updateBookmarkButton() {
      const button = document.getElementById("save-button");
      if (!button) return;
      const state = readBookmarkState();
      const saved = (state.favorites.has(bookmarkKey) || isRecommended) && !state.excludedRecommendations.has(bookmarkKey);
      button.classList.toggle("is-saved", saved);
      button.setAttribute("aria-pressed", String(saved));
      button.innerHTML = `<span class="save-star" aria-hidden="true">${saved ? "★" : "☆"}</span><span>${saved ? "Saved to bookmarks" : "Save to bookmarks"}</span>`;
    }

    function setupBookmarkButton() {
      const button = document.getElementById("save-button");
      if (!button) return;
      updateBookmarkButton();
      button.addEventListener("click", () => {
        const state = readBookmarkState();
        const saved = (state.favorites.has(bookmarkKey) || isRecommended) && !state.excludedRecommendations.has(bookmarkKey);
        if (saved) {
          state.favorites.delete(bookmarkKey);
          if (isRecommended) state.excludedRecommendations.add(bookmarkKey);
        } else {
          state.favorites.add(bookmarkKey);
          state.excludedRecommendations.delete(bookmarkKey);
        }
        writeBookmarkState(state);
        updateBookmarkButton();
      });
      window.addEventListener("storage", (event) => { if (event.key === BOOKMARK_STATE_KEY) updateBookmarkButton(); });
    }

      const ltv = toNumber(record["In-Place LTV"]);
      const exchangeStatus = field("721 Exchange Exit");
      const eligible721 = ["Mandatory", "Optional"].includes(exchangeStatus);
      const propertyType = field("Property Type");
      const propertyTypeLower = propertyType.toLowerCase();
      const structure = field("Structure");
      const location = field("Location (Use)", field("Location"));
      const documentsAvailable = OFFERING_DOCUMENTS.length > 0;
      const averageYield = field("Average Yield");
      const peakYield = disclosedYields.length ? percent(Math.max(...disclosedYields)) : "Not disclosed";
      const growth = disclosedYields.length > 1 && disclosedYields[0] !== 0 ? percent(((disclosedYields[disclosedYields.length - 1] / disclosedYields[0]) - 1) * 100) : "Not disclosed";

      const propertyContext = propertyTypeLower.includes("health") || propertyTypeLower.includes("medical")
        ? "Healthcare and medical-office properties are generally evaluated through tenant credit, lease duration, reimbursement structure, location quality, operating demand, and re-leasing risk. The offering documents provide the property-specific underwriting details."
        : propertyTypeLower.includes("multifamily")
          ? "Multifamily properties are generally evaluated through occupancy, rent growth, household demand, operating expenses, resident concentration, and the local housing market. The offering documents provide the property-specific underwriting details."
          : propertyTypeLower.includes("industrial")
            ? "Industrial properties are generally evaluated through tenant credit, building functionality, logistics access, lease term, rent growth, and local supply. The offering documents provide the property-specific underwriting details."
            : propertyTypeLower.includes("retail")
              ? "Retail properties are generally evaluated through tenant sales or credit, traffic, visibility, lease structure, co-tenancy, and local competition. The offering documents provide the property-specific underwriting details."
              : propertyTypeLower.includes("office")
                ? "Office properties are generally evaluated through tenant credit, occupancy, lease rollover, work-pattern trends, building quality, and submarket demand. The offering documents provide the property-specific underwriting details."
                : propertyTypeLower.includes("mineral")
                  ? "Mineral royalties are evaluated differently from traditional real estate because income depends on production, commodity activity, reserve characteristics, operator performance, and royalty terms. Review the offering documents for the specific royalty interests and assumptions."
                  : "The property type should be evaluated using the offering documents, including the asset, tenant or operator, market, lease or royalty terms, expenses, and exit assumptions.";

      const core = [
        { question:`What is ${field("Investment Name")} and what does it offer?`, answer:field("Description") },
        { question:`What is the investment structure for ${field("Investment Name")}?`, answer:`This offering is structured as a ${structure}. The supplied record identifies the investment as ${field("Strategy")} and lists its status as ${field("Status")}.` },
        { question:`What property type and location does this offering involve?`, answer:`The offering is categorized as ${propertyType} and identifies the location as ${location}.` },
        { question:`What are the expected yield and cash-flow characteristics?`, answer:hasCashFlowForecast ? `The supplied forecast shows a Year 1 yield of ${field("Y1")}, an average yield of ${averageYield}, and a peak disclosed yield of ${peakYield}. The record also lists a tax-adjusted yield of ${field("Tax Adjusted Yield (Use)")} and a cap rate equivalent of ${field("Cap Rate Equivalent")}. Across the disclosed forecast, the change from the first to last positive yield is ${growth}.` : "No positive annual cash-flow yield is disclosed in the supplied forecast. This may indicate a zero-coupon, deferred-income, or otherwise non-distributing structure; review the offering documents for timing and return mechanics." },
        { question:`Does this offering use debt, and what is the LTV?`, answer:allCash ? `This is an all-cash offering with ${field("In-Place LTV")} and no loan or debt-service obligation. The financing fields are therefore not applicable under the standardized client-facing labels.` : `The offering reports ${field("In-Place LTV")} and debt of ${field("Debt")}. Review the lender, interest rate, term, amortization, and DSCR information in the financing section.` },
        { question:`Is this offering eligible for a 721 Exchange exit?`, answer:eligible721 ? `The supplied record identifies a ${exchangeStatus} 721 Exchange exit. This is an offering-level designation, not a tax opinion or guarantee that a particular investor or transaction will qualify.` : "The supplied record identifies no 721 Exchange exit. Investors should not assume 721 eligibility unless it is expressly documented and confirmed by qualified tax and legal professionals." },
        { question:`What is the minimum investment and expected hold period?`, answer:`The minimum investment is ${field("Minimum Investment")} and the estimated hold period is ${field("Estimated Hold Period")}. These are source-provided terms and may not describe every investor-specific requirement or exit scenario.` },
        { question:`Who is the sponsor of this offering?`, answer:`The sponsor is ${field("Sponsor")}. The supplied sponsor profile lists ${field("Sponsor Founded")} as the founding year, ${field("Sponsor AUM")} in AUM, and ${field("Full-Cycle Count")} in full-cycle history. ${field("Sponsor Description")}` }
      ];

      const contextual = [
        { when:eligible721, question:"What is a private REIT in the context of a 721 Exchange?", answer:"A private REIT is a privately offered, non-publicly traded real estate investment trust. A qualifying 721 transaction may exchange an eligible real estate interest for operating-partnership or similar interests, subject to the sponsor structure, transaction documents, and tax and legal requirements. Private REIT liquidity, valuation, transfer, and redemption terms may be limited." },
        { when:!hasCashFlowForecast, question:"How should investors evaluate an offering with no annual cash-flow forecast?", answer:"When no positive annual yield is disclosed, investors should review whether the offering is zero-coupon, deferred-income, development-oriented, royalty-based, or otherwise structured to return value through a later sale or liquidity event. The offering documents should control the timing, conditions, and risks of any projected return." },
        { when:ltv !== null && ltv >= 60, question:"What does the offering's LTV indicate about leverage?", answer:`The offering reports ${field("In-Place LTV")}. Higher LTV can increase exposure to interest expense, refinancing, valuation, and debt-service risk, even though leverage may also affect equity returns. Review the loan terms and DSCR alongside the LTV rather than treating LTV as a standalone risk measure.` },
        { when:true, question:`What should investors know about ${propertyType.toLowerCase()} investments?`, answer:propertyContext },
        { when:documentsAvailable, question:"Are offering documents available for review?", answer:`${OFFERING_DOCUMENTS.length} offering documents are listed in the Offering Documents section, including ${OFFERING_DOCUMENTS.map((document) => document.label).join(", ")}. Review the documents for the governing terms, risks, financial assumptions, and eligibility requirements.` },
        { when:String(field("Tax Adjusted Yield (Use)")).toLowerCase() !== "not disclosed", question:"What is the tax-adjusted yield?", answer:`The supplied tax-adjusted yield is ${field("Tax Adjusted Yield (Use)")}. ${field("Tax Adj Label")}. Tax-adjusted metrics depend on stated assumptions and are not a substitute for individualized tax advice.` },
        { when:field("Cons") !== "Not disclosed", question:"What are the principal risks and tradeoffs?", answer:field("Cons") },
        { when:field("BM: Avg. Income - Deal") !== "Not disclosed", question:"How does this offering compare with market benchmarks?", answer:`The benchmark section compares deal and market reference values for income, growth, and peak performance. It reports income at ${field("BM: Avg. Income - Deal")} versus ${field("BM: Avg. Income - MKT")}, growth at ${field("BM: Growth - Deal")} versus ${field("BM: Growth- MKT")}, and peak at ${field("BM: Peak - Deal")} versus ${field("BM: Peak- MKT")}. Benchmark results are context, not a prediction of future performance.` }
      ].filter((item) => item.when);

      const faqItems = [...core, ...contextual].slice(0, 10);
      const faqSection = document.createElement("section");
      faqSection.className = "section";
      faqSection.id = "offering-faq";
      faqSection.innerHTML = `<h2>Frequently asked questions</h2><div class="faq-list">${faqItems.map((item) => `<details class="faq-item"><summary>${escapeHtml(item.question)}</summary><div class="faq-answer"><p>${escapeHtml(item.answer)}</p></div></details>`).join("")}</div>`;
      document.getElementById("documents")?.insertAdjacentElement("afterend", faqSection);

      const schema = document.createElement("script");
      schema.id = "offering-faq-schema";
      schema.type = "application/ld+json";
      schema.textContent = JSON.stringify({ "@context":"https://schema.org", "@type":"FAQPage", mainEntity:faqItems.map((item) => ({ "@type":"Question", name:item.question, acceptedAnswer:{ "@type":"Answer", text:item.answer } })) });
      document.head.appendChild(schema);
      document.querySelector(".page-anchors")?.insertAdjacentHTML("beforeend", '<a href="#offering-faq">FAQ</a>');
    }

    function setupPageAnchors() {
      const anchors = document.querySelector(".page-anchors");
      if (!anchors || anchors.querySelector(".page-anchors-toggle")) return;
      const toggle = document.createElement("button");
      toggle.className = "page-anchors-toggle";
      toggle.type = "button";
      toggle.setAttribute("aria-expanded", "false");
      toggle.setAttribute("aria-controls", "offering-section-links");
      toggle.innerHTML = '<span>On this page</span><span aria-hidden="true">⌃</span>';
      const links = document.createElement("span");
      links.id = "offering-section-links";
      links.style.display = "contents";
      anchors.prepend(toggle, links);
      [...anchors.querySelectorAll(":scope > a")].forEach((link) => links.appendChild(link));
      const setOpen = (open) => {
        anchors.classList.toggle("is-open", open);
        toggle.setAttribute("aria-expanded", String(open));
        toggle.lastElementChild.textContent = open ? "⌄" : "⌃";
      };
      toggle.addEventListener("click", () => setOpen(!anchors.classList.contains("is-open")));
      anchors.querySelectorAll("a").forEach((link) => link.addEventListener("click", () => setOpen(false)));
    }

    function insertInvestmentProfessionalCard() {
      if (!record) return;
      const heroMedia = document.querySelector(".hero-media");
      const heroPhoto = heroMedia?.querySelector(".hero-photo");
      if (!heroMedia || !heroPhoto || heroMedia.querySelector(".contact-card-compact")) return;
      const contactCard = document.createElement("div");
      contactCard.className = "contact-card contact-card-compact";
      contactCard.innerHTML = '<div class="contact-photo" role="img" aria-label="Investment professional photo placeholder">IP</div><div class="contact-copy"><p class="eyebrow">Your investment professional</p><h3>Investment professional</h3><p>Baker 1031</p><div class="contact-details"><div><strong>Phone</strong> Contact details to be added</div><div><strong>Email</strong> Contact details to be added</div></div></div>';
      heroPhoto.insertAdjacentElement("afterend", contactCard);
    }

    function setupOfferingActionBar() {
      const hero = document.querySelector(".offering-hero");
      const heroMedia = hero?.querySelector(".hero-media");
      const existingActions = heroMedia?.querySelector(".hero-media-actions");
      if (!hero || !heroMedia || !existingActions || hero.querySelector(".offering-actions-bar")) return;
      const returnLink = existingActions.querySelector(".detail-action");
      const saveButton = existingActions.querySelector(".save-button");
      if (!returnLink || !saveButton) return;

      const documentsLink = document.createElement("a");
      documentsLink.className = "detail-action documents-action";
      documentsLink.href = "#documents";
      documentsLink.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5A1.5 1.5 0 0 1 5.5 6h5l2 2h6A1.5 1.5 0 0 1 20 9.5v8A1.5 1.5 0 0 1 18.5 19h-13A1.5 1.5 0 0 1 4 17.5z"></path><path d="M4.5 10h15"></path></svg><span>Offering Documents</span>';
      const rightActions = document.createElement("div");
      rightActions.className = "offering-actions-right";
      rightActions.append(saveButton, documentsLink);

      existingActions.className = "offering-action-inner";
      existingActions.innerHTML = "";
      existingActions.append(returnLink, rightActions);
      const actionBar = document.createElement("div");
      actionBar.className = "offering-actions-bar";
      actionBar.append(existingActions);
      hero.prepend(actionBar);
    }

    function applyClientFacingCleanup() {
      document.getElementById("source-data")?.remove();
      document.querySelector('.page-anchors a[href="#source-data"]')?.remove();

      document.querySelectorAll("#financial-forecast .forecast-wide tbody tr").forEach((row) => {
        if (/projection status/i.test(row.textContent || "")) row.remove();
      });
      document.querySelectorAll("#financial-forecast .forecast-compact tr").forEach((row) => {
        if (row.children.length >= 3) row.lastElementChild.remove();
      });

      const allCash = record && (record["Debt"] === "$0" || /none|no debt/i.test(record["Lender"] || ""));
      if (allCash) {
        const standardizedFinancing = {
          "Lender":"None (debt-free)",
          "Interest Rate":"N/A (no debt)",
          "Loan Term":"N/A (no debt)",
          "I/O Period":"N/A (no debt)",
          "Amortization":"N/A (no debt)",
          "Y1 DSCR":"N/A - no debt service"
        };
        document.querySelectorAll("#financing .finance-table tbody tr").forEach((row) => {
          const label = row.querySelector("th")?.textContent?.trim();
          if (label && standardizedFinancing[label]) row.querySelector("td").textContent = standardizedFinancing[label];
        });
      }

      const documentsTable = document.querySelector("#documents .documents-table");
      documentsTable?.querySelectorAll("tr").forEach((row) => row.firstElementChild?.remove());

      const anchors = document.querySelector(".page-anchors");
      if (record && ["Mandatory", "Optional"].includes(record["721 Exchange Exit"])) {
        const reitSection = document.createElement("section");
        reitSection.className = "section";
        reitSection.id = "reit";
        reitSection.innerHTML = `<h2>721 Exchange and private REIT</h2><div class="reit-section"><p>This offering identifies a ${escapeHtml(record["721 Exchange Exit"])} 721 Exchange exit. A private REIT is a privately offered, non-publicly traded real estate investment trust that may provide a potential continuation strategy after a qualifying contribution, subject to sponsor structure, transaction eligibility, and tax advice.</p><ul class="reit-points"><li><strong>Private structure</strong><br>Shares or interests are not traded on a public exchange.</li><li><strong>Liquidity</strong><br>Redemptions, valuation, transfer rules, and timing are governed by the governing documents and may be limited.</li><li><strong>Professional review</strong><br>A 721 exchange can have complex tax and legal requirements. Review the offering documents with qualified tax and legal professionals.</li></ul></div>`;
        document.getElementById("financing")?.insertAdjacentElement("afterend", reitSection);
        anchors?.insertAdjacentHTML("beforeend", '<a href="#reit">721 / REIT</a>');
      }

    }

    if (record) renderMappedOffering(); else renderUnmappedOffering();
    applyClientFacingCleanup();
    insertDynamicFaq();
    insertInvestmentProfessionalCard();
    setupOfferingActionBar();
    setupPageAnchors();
    setupBookmarkButton();
  </script>
  <div data-site-footer></div>
</body>
</html>
